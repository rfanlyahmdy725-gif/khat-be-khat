<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خط‌به‌خط | مسیریاب هوشمند حمل‌ونقل عمومی</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Tahoma, sans-serif; }
        body { background-color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* City Selection Screen */
        #city-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e3a8a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
        .city-btn { background: white; color: #1e3a8a; border: none; padding: 12px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 25px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Header & Hamburger Menu */
        header { background: #1e3a8a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        .hamburger { font-size: 1.5rem; cursor: pointer; background: none; border: none; color: white; }
        
        /* Sidebar Menu */
        #sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        #sidebar.open { right: 0; }
        .close-sidebar { background: none; border: none; font-size: 1.2rem; float: left; cursor: pointer; margin-bottom: 20px; }
        .sidebar-item { padding: 12px; background: #f1f5f9; margin-bottom: 8px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .sidebar-item:hover { background: #e2e8f0; }

        /* Main Content Grid */
        #main-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        #map { flex: 1; width: 100%; height: 100%; }

        /* Routing Floating Box */
        #routing-box { position: absolute; top: 15px; left: 15px; right: 15px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 500; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; align-items: center; background: #f1f5f9; border-radius: 15px; padding: 5px 15px; }
        .input-row input { border: none; background: transparent; width: 100%; padding: 8px; font-size: 0.9rem; outline: none; }
        .route-btn { background: #2563eb; color: white; border: none; padding: 10px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        /* Guide Sheet (Bottom) */
        #guide-sheet { background: white; padding: 15px; border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); max-height: 180px; overflow-y: auto; z-index: 500; display: none; }
    </style>
</head>
<body>

    <div id="city-screen">
        <h2>به ایستگاه خط‌به‌خط خوش آمدید</h2>
        <p style="margin-top: 10px; color: #93c5fd;">لطفاً شهر خود را انتخاب کنید:</p>
        <button class="city-btn" onclick="selectCity('مشهد')">📍 مشهد مقدس</button>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #93c5fd;">شهرهای دیگر به زودی...</p>
    </div>

    <header>
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div id="header-title">خط‌به‌خط</div>
        <div style="width: 24px;"></div> </header>

    <div id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
        <h3 style="margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">نقشه خطوط فعال</h3>
        <div class="sidebar-item" onclick="showSpecificLine('metro1')">🚇 مترو - خط ۱</div>
        <div class="sidebar-item" onclick="showSpecificLine('metro2')">🚇 مترو - خط ۲</div>
        <div class="sidebar-item" onclick="showSpecificLine('brt800')">🚌 بی‌آرتی - خط ۸۰۰</div>
        <div class="sidebar-item" onclick="showSpecificLine('brt802')">🚌 بی‌آرتی - خط ۸۰۲</div>
    </div>

    <div id="main-container">
        <div id="routing-box">
            <div class="input-row">
                <span>🟢</span>
                <input type="text" id="origin" placeholder="مبدا: مکان فعلی شما..." readonly onclick="requestLocation()">
            </div>
            <div class="input-row">
                <span>🔴</span>
                <input type="text" id="destination" placeholder="مقصد خود را وارد کنید...">
            </div>
            <button class="route-btn" onclick="startRouting()">مسیریابی هوشمند</button>
        </div>

        <div id="map"></div>
    </div>

    <div id="guide-sheet">
        <strong style="color: #1e3a8a; display: block; margin-bottom: 5px;">🗺️ راهنمای مسیر شما:</strong>
        <p id="guide-text" style="font-size: 0.9rem; line-height: 1.6; color: #334155;"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // دیتابیس ثابت خطوط مشهد
        const transitData = {
            metro1: { title: "مترو خط ۱", stations: ["وکیل‌آباد", "دانشگاه فردوسی", "تقی‌آباد", "بسیج", "فرودگاه"], coords: [[36.3312, 59.4872], [36.3110, 59.5445], [36.2970, 59.5840], [36.2790, 59.6260]] },
            metro2: { title: "مترو خط ۲", stations: ["کوهسنگی", "تقی‌آباد", "شهدا", "راه‌آهن", "طبرسی"], coords: [[36.2760, 59.5720], [36.2970, 59.5840], [36.3020, 59.6050], [36.3420, 59.6380]] },
            brt800: { title: "بی‌آرتی ۸۰۰", stations: ["ترمینال امام رضا", "فلکه آب (حرم)", "میدان شهدا", "پایانه طبرسی"], coords: [[36.2570, 59.6150], [36.2870, 59.6160], [36.3020, 59.6050], [36.3550, 59.6480]] },
            brt802: { title: "بی‌آرتی ۸۰۲", stations: ["الهیه", "میدان نمایشگاه", "میدان آزادی", "حرم مطهر", "مصلی"], coords: [[36.3710, 59.4620], [36.3520, 59.4950], [36.3280, 59.5310], [36.2870, 59.6160]] }
        };

        const map = L.map('map').setView([36.2972, 59.6067], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let currentPolyline = null;

        // انتخاب شهر
        function selectCity(cityName) {
            document.getElementById('city-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('city-screen').style.display = 'none';
                document.getElementById('header-title').innerText = `خط‌به‌خط (${cityName})`;
            }, 500);
        }

        // باز و بسته کردن منوی همبرگری
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // درخواست دسترسی به مکان کاربر (GPS)
        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    document.getElementById('origin').value = "مکان فعلی شما ثبت شد 📍";
                    L.marker([lat, lng]).addTo(map).bindPopup("شما اینجا هستید").openPopup();
                    map.setView([lat, lng], 14);
                }, () => {
                    alert("دسترسی به لوکیشن داده نشد. لطفاً تنظیمات مرورگر را چک کنید.");
                });
            }
        }

        // نمایش یک خط خاص از منوی همبرگری با تمام ایستگاه‌ها
        function showSpecificLine(lineKey) {
            toggleSidebar();
            const data = transitData[lineKey];
            if (currentPolyline) map.removeLayer(currentPolyline);
            
            currentPolyline = L.polyline(data.coords, {color: 'blue', weight: 6}).addTo(map);
            map.fitBounds(currentPolyline.getBounds());

            alert(`مسیر ${data.title} فعال شد.\nایستگاه‌های توقف:\n${data.stations.join(' ➔ ')}`);
        }

        // شبیه‌سازی الگوریتم مسیریابی هوشمند بین مبدا و مقصد
        function startRouting() {
            const dest = document.getElementById('destination').value;
            if(!dest) { alert("لطفاً مقصد را وارد کنید!"); return; }

            // نمایش راهنمای پایین صفحه به سبک درخواستی شما
            document.getElementById('guide-sheet').style.display = 'block';
            document.getElementById('guide-text').innerHTML = `
                شما در موقعیت فعلی هستید. ابتدا به اندازه <b>۲۰۰ متر پیاده‌روی</b> کنید تا به نزدیک‌ترین ایستگاه بی‌آرتی برسید. <br>
                سپس سوار <b>خط ۸۰۰ (بی‌آرتی حرم)</b> شده و بعد از ۳ ایستگاه توقف، در ایستگاه حرم مطهر پیاده شوید.
            `;
            
            // نمایش خط فرضی روی نقشه
            showSpecificLine('brt800');
            document.getElementById('sidebar').classList.remove('open'); // بستن سایدبار در صورت باز بودن
        }
    </script>
</body>
</html>
